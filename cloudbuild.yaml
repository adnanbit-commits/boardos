options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/boardos-backend:$COMMIT_SHA', './backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build',
      '--build-arg', 'API_INTERNAL_URL=http://backend:3001',
      '--build-arg', 'NEXT_PUBLIC_API_URL=http://34.180.29.29:3001',
      '--build-arg', 'NEXT_PUBLIC_APP_URL=http://34.180.29.29:3000',
      '-t', 'gcr.io/$PROJECT_ID/boardos-frontend:$COMMIT_SHA',
      './frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/boardos-backend:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/boardos-frontend:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - compute
      - ssh
      - boardos-vm-b
      - --zone=asia-south1-c
      - --project=$PROJECT_ID
      - --tunnel-through-iap
      - --command=/opt/boardos/deploy.sh
